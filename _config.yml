about_content: |
  <font size="5"><b>안녕하십니까? 클라이언트 개발자 최은호입니다.</b></font>
  <br>
  제가 개발자의 길을 선택한 계기는 게임이었습니다. 어린 시절 플레이했던 게임 속 한 장면이 누군가의 설계와 고민이 만들어낸 결과물이라는 사실을 알게 된 순간부터, 저는 게임 개발의 매력에 빠지게 되었습니다. 청강문화산업대학교 게임전공을 선택한 것도 그 때문이었습니다.
  <br>
  <br>
  졸업 이후 셀빅에서 실감형 콘텐츠 개발자로 커리어를 시작했으며, 지난 6년간 다양한 프로젝트의 클라이언트를 전담 개발하여 Unity 엔진에 대한 이해, 최적화 감각, 아키텍처 설계 역량을 단단히 쌓아왔습니다. 실감형 콘텐츠와 게임은 완전히 같지는 않지만, 플레이어의 경험을 코드로 설계한다는 본질은 다르지 않다고 생각합니다. 지금까지 쌓아온 경험이 게임 개발 현장에서도 충분히 가치를 발휘할 수 있을 것이라 확신합니다.
  <br>
  <br>
  저는 게임 클라이언트 프로그래머로서 필요한 역량을 갖추기 위해 세 가지 축에서 꾸준히 준비해왔습니다.
  <br>
  <br>
  첫째, 탄탄한 기본기와 엔진에 대한 깊이 있는 이해입니다. 중학생 때 스크립트 언어로 게임 개발을 시작하고, 차츰 프로그래밍 언어와 메모리에 대한 기초를 다진 뒤, 청강문화산업대학교 게임전공을 거치며 이론과 실전을 함께 쌓았습니다. 실무에서는 Unity의 기본 기능(Rigidbody, Animator, UGUI)을 넘어 Addressables 기반 리소스 관리, ScriptableObject 기반 데이터 설계, UniTask와 CancellationToken을 활용한 비동기 처리, URP RenderGraph 기반 커스텀 RenderPass, HLSL Shader 및 Compute Shader 작성까지 엔진의 폭넓은 영역을 직접 다뤄왔습니다.
  <br>
  <br>
  둘째, 확장성과 유지보수성을 고려한 설계 역량입니다. 6년간 다수의 콘텐츠를 전담하며 느낀 것은, 혼자 빨리 짤 수 있는 코드보다 팀이 오래 유지할 수 있는 코드가 더 가치있다는 것입니다. 처음에는 빠르게 동작하는 코드를 만드는 데 집중했지만, 프로젝트가 커지고 요구사항이 바뀔 때마다 취약한 구조가 어떻게 개발 속도를 갉아먹는지 반복해서 체감했습니다. 그 이후로 저는 기능을 구현할 때 "지금 돌아가는가"만큼이나 "나중에 쉽게 수정하고 확장할 수 있는가", "팀원이 읽었을 때 의도가 드러나는가"를 기준으로 삼아왔고, 구현에 앞서 "어떤 지점이 바뀔 가능성이 있는가"를 먼저 고민하는 습관을 들였습니다. 변화가 예상되는 지점은 추상화를 통해 확장 포인트를 열어두고, 데이터와 로직을 분리해 수정의 영향 범위를 최소화하는 식입니다.
  <br>
  <br>
  셋째, 지속적인 학습과 지식 공유입니다. 개인 기술 블로그에 새롭게 학습한 내용을 정리하며 개념을 재정립하는 습관을 이어오고 있습니다. 글로 정리하는 과정에서 단순히 쓸 줄 아는 수준을 넘어 "왜 그렇게 동작하는지" 설명할 수 있는 이해로 나아갈 수 있었습니다. 또한 팀 내에서 네이밍 컨벤션을 정립하고 세미나를 진행하며 개인의 학습을 팀의 성장으로 확장하는 경험도 쌓았습니다. 이러한 준비는 혼자 잘하는 개발자가 아니라, 팀과 함께 잘 만드는 개발자가 되기 위한 과정이었습니다.
  <br>
  <br>
  이제는 그동안 쌓아온 경험과 역량을 제가 가장 만들고 싶었던 영역, 게임에서 사용하고자 지원하게 되었습니다. 6년간 기다려온 이 전환점에서 단순히 합류하는 것을 넘어, 빠르게 팀에 녹아들어 제 몫을 해내는 것을 시작으로 장기적으로는 프로젝트의 다음 여정을 함께 설계하는 핵심 구성원으로 성장해 나가겠습니다.


